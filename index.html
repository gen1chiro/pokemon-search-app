<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/82b12ac003.js" crossorigin="anonymous"></script>
    <title>Pokemon Search App</title>
</head>
<body>
    <main class="container">
        <div class="upper base">
            <div class="input-container">
                <label for="search-input">Enter name or id of pokemon</label>
                <div class="input-button-container">
                    <input id="search-input" type="text" required>
                    <div class="button">
                        <button id="search-button"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                </div>
            </div>
            <div id="sprite-container"></div>
        </div>
        <div class="lower">
            <div class="name-container">
                <p id="pokemon-name"></p>
                <p id="pokemon-id"></p>
            </div>
            <div id="types"></div>
            <div class="info-container">
                <div class="stat-container">
                    weight
                    <p id="weight"></p>
                </div>
                <div class="stat-container">
                    height
                    <p id="height"></p>
                </div>
                <div class="stat-container">
                    hp
                    <p id="hp"></p>
                </div>
                <div class="stat-container">
                    attack
                    <p id="attack"></p>
                </div>
                <div class="stat-container">
                    defense
                    <p id="defense"></p>
                </div>
                <div class="stat-container">
                    special-attack
                    <p id="special-attack"></p>
                </div>
                <div class="stat-container">
                    special-defense
                    <p id="special-defense"></p>
                </div>
                <div class="stat-container">
                    speed
                    <p id="speed"></p>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
