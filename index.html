<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Search App</title>
</head>
<body>
    <label for="search-input">Enter name or id of pokemon</label>
    <input id="search-input" type="text" required>
    <button id="search-button">Search</button>
    <div class="info-container">
        <p id="pokemon-name"></p>
        <p id="pokemon-id"></p>
        <div id="sprite-container"></div>
        <p id="weight"></p>
        <p id="height"></p>
        <p id="types"></p>
        <p id="hp"></p>
        <p id="attack"></p>
        <p id="defense"></p>
        <p id="special-attack"></p>
        <p id="special-defense"></p>
        <p id="speed"></p>
    </div>
<script src="script.js"></script>
</body>
</html>
